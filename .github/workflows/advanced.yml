name: Advanced — Percy on Automate

# PER-8195 Phase 3 — advanced example for io.percy:percy-java-selenium (Automate mode).
# Triggers manually only (`workflow_dispatch`).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  advanced:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: advanced
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sanity-check required secrets
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: |
          missing=()
          [ -z "$BROWSERSTACK_USERNAME" ] && missing+=(BROWSERSTACK_USERNAME)
          [ -z "$BROWSERSTACK_ACCESS_KEY" ] && missing+=(BROWSERSTACK_ACCESS_KEY)
          [ -z "$PERCY_TOKEN" ]            && missing+=(PERCY_TOKEN)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required repo secrets: ${missing[*]}"
            exit 1
          fi
      - name: Install advanced/ dependencies
        run: make install
      - name: Run mvn test advanced against BrowserStack Automate
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          PERCY_BRANCH: ${{ github.ref_name }}
          PERCY_COMMIT: ${{ github.sha }}
        run: make test
